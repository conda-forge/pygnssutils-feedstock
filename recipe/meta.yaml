{% set name = "pygnssutils" %}
{% set version = "1.2.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pygnssutils-{{ version }}.tar.gz
  sha256: 038f4d53a5e17230b4f31fbbf3341d5bde9d697fa46d97b6050fa4b60a638674
build:
  entry_points:
    - gnssstreamer = pygnssutils.gnssstreamer_cli:main
    - gnssserver = pygnssutils.gnssserver_cli:main
    - gnssntripclient = pygnssutils.gnssntripclient_cli:main
    - gnssmqttclient = pygnssutils.gnssmqttclient_cli:main

  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=75.0.0
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - certifi >=2025.0.0
    - paho-mqtt >=2.1.0
    - pyserial >=3.5
    - pyspartn >=1.0.8
    - pyubx2 >=1.3.1
    - pysbf2 >=1.0.4
    - pyunigps >=1.0.0
    - pyqgc >=0.2.2
    - pynmeagps >=1.1.4
    - pyubxutils >=1.0.6

test:
  imports:
    - pygnssutils
  commands:
    - pip check
    - gnssstreamer --help
    - gnssserver --help
    - gnssntripclient --help
    - gnssmqttclient --help
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/semuconsulting/pygnssutils
  description: Python GNSS CLI utility library.
  summary: Python GNSS CLI utility library.
  license: BSD-3-Clause
  license_file: LICENSE
  doc_url: https://www.semuconsulting.com/pygnssutils
  dev_url: https://github.com/semuconsulting/pygnssutils

extra:
  recipe-maintainers:
    - semuadmin
